schema_version: 2
id: memory_basic
name: Basic Memory
summary: Add Hermes-style local USER.md and MEMORY.md persistent memory.
tags:
  - memory
  - context
components:
  - id: memory_lib
    kind: lib
    source: memory_basic
    target: agent/lib/memory_basic
    config:
      storage:
        relative_to: core_root
        path: memory
      limits:
        memory_chars: 2200
        user_chars: 1375
  - id: memory_basic
    kind: bootstrap
    source: memory_basic
    target: agent/bootstrap/memory_basic
    pipeline:
      after: session_context
  - id: memory_tool
    kind: tool
    source: memory
    target: agent/tools/memory
