name: Bug report
description: Report reproducible incorrect behavior.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for someone else to reproduce it from a clean checkout or install.
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include exact commands, config snippets, and any relevant input.
      placeholder: |
        1. Run `uv run demiurge --provider fake`
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - CLI
        - TUI
        - Provider adapter
        - Agent core authoring
        - Package management
        - Tools or approvals
        - Runtime home or sessions
        - Telegram or external channels
        - Documentation
        - Unsure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Command output or logs
      description: Paste the smallest useful output. Remove secrets and tokens.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, install method, package version or commit, and provider if relevant.
      placeholder: |
        OS:
        Python:
        demiurge version or commit:
        Install method:
        Provider:
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets, API keys, tokens, and private paths from this report.
          required: true
        - label: I tried the fake provider path when it was relevant.
          required: false
