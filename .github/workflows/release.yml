name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version from pyproject.toml, for example 0.3.2"
        required: true
        type: string
      tag:
        description: "Git tag to create. Defaults to v<version>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            ui-tui/package-lock.json
            website/package-lock.json

      - name: Install Python dependencies
        run: uv sync --locked --group dev --python "3.11"

      - name: Resolve release inputs
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION#v}"
          tag="${INPUT_TAG:-v${version}}"
          notes="docs/releases/${version}.md"

          case "$version" in
            *[!0-9A-Za-z.-]* | "" )
              echo "Invalid version: $version" >&2
              exit 1
              ;;
          esac

          if [[ "$tag" != v* ]]; then
            echo "Release tag must start with v: $tag" >&2
            exit 1
          fi

          {
            echo "RELEASE_VERSION=$version"
            echo "RELEASE_TAG=$tag"
            echo "RELEASE_NOTES=$notes"
          } >> "$GITHUB_ENV"

      - name: Verify version and release notes
        run: |
          set -euo pipefail
          test -f "$RELEASE_NOTES"

          pyproject_version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          package_version="$(uv run python -c 'import demiurge; print(demiurge.__version__)')"

          test "$pyproject_version" = "$RELEASE_VERSION"
          test "$package_version" = "$RELEASE_VERSION"

          escaped_version="${RELEASE_VERSION//./\\.}"
          grep -nE "^# Demiurge ${escaped_version}$" "$RELEASE_NOTES"
          grep -nF "/docs/releases/${RELEASE_VERSION}" \
            website/docusaurus.config.ts \
            website/i18n/zh-CN/docusaurus-theme-classic/footer.json

      - name: Check tag and release do not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --tags origin

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Local tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Remote tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release already exists: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Compile Python sources
        run: uv run python -m compileall demiurge tests

      - name: Run Python tests
        run: uv run pytest -vv --durations=20 -o faulthandler_timeout=60

      - name: Check CLI help
        run: |
          uv run demiurge --help
          uv run demiurge init --help

      - name: Install TUI dependencies
        working-directory: ui-tui
        run: npm ci

      - name: Typecheck TUI
        working-directory: ui-tui
        run: npm run typecheck

      - name: Test TUI
        working-directory: ui-tui
        run: npm test -- --run

      - name: Build TUI
        working-directory: ui-tui
        run: npm run build

      - name: Check packaged TUI asset
        run: cmp ui-tui/dist/entry.js demiurge/ui/tui_dist/entry.js

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Check whitespace
        run: git diff --check -- ':!demiurge/ui/tui_dist/entry.js'

      - name: Build release artifacts
        run: uv build

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          wheel="dist/demiurge-${RELEASE_VERSION}-py3-none-any.whl"
          sdist="dist/demiurge-${RELEASE_VERSION}.tar.gz"

          test -f "$wheel"
          test -f "$sdist"
          uv run python -m zipfile -l "$wheel" | rg 'demiurge/resources/(agents|agent-catalog)|demiurge/ui/tui_dist/entry.js'
          if tar -tzf "$sdist" | rg '^demiurge-[^/]+/\.temp/'; then
            echo "sdist includes .temp content" >&2
            exit 1
          fi

      - name: Smoke test wheel install
        run: scripts/smoke_wheel_install.sh

      - name: Create annotated tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "demiurge ${RELEASE_VERSION}"
          git push origin "$RELEASE_TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          args=()
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" \
            --title "Demiurge ${RELEASE_VERSION}" \
            --notes-file "$RELEASE_NOTES" \
            "${args[@]}" \
            "dist/demiurge-${RELEASE_VERSION}-py3-none-any.whl" \
            "dist/demiurge-${RELEASE_VERSION}.tar.gz"

      - name: Verify published release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git ls-remote --exit-code --tags origin "$RELEASE_TAG"
          git ls-remote --exit-code --tags origin "${RELEASE_TAG}^{}"
          gh release view "$RELEASE_TAG" --json tagName,name,isDraft,isPrerelease,publishedAt,url
