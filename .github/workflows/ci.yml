name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }} / ${{ matrix.test-label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
            test-profile: full
            test-shard: all
            test-label: full
            run-baseline: "true"
            managed-install-smoke: "true"
          - os: ubuntu-latest
            python-version: "3.12"
            test-profile: full
            test-shard: all
            test-label: full
            run-baseline: "true"
            managed-install-smoke: "false"
          - os: ubuntu-latest
            python-version: "3.13"
            test-profile: full
            test-shard: all
            test-label: full
            run-baseline: "true"
            managed-install-smoke: "false"
          - os: windows-latest
            python-version: "3.11"
            test-profile: full
            test-shard: channels
            test-label: channels
            run-baseline: "false"
            managed-install-smoke: "false"
          - os: windows-latest
            python-version: "3.11"
            test-profile: full
            test-shard: runtime
            test-label: runtime
            run-baseline: "false"
            managed-install-smoke: "false"
          - os: windows-latest
            python-version: "3.11"
            test-profile: full
            test-shard: packages
            test-label: packages
            run-baseline: "false"
            managed-install-smoke: "false"
          - os: windows-latest
            python-version: "3.11"
            test-profile: full
            test-shard: rest
            test-label: rest
            run-baseline: "true"
            managed-install-smoke: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group dev --python "${{ matrix.python-version }}"

      - name: Compile Python sources
        if: matrix.run-baseline == 'true'
        run: uv run python -m compileall demiurge tests

      - name: Run Python tests
        run: uv run python scripts/run_python_ci_tests.py --profile "${{ matrix.test-profile }}" --shard "${{ matrix.test-shard }}"

      - name: Check CLI help
        if: matrix.run-baseline == 'true'
        run: |
          uv run demiurge --help
          uv run demiurge init --help

      - name: Build package
        if: matrix.run-baseline == 'true'
        run: uv build

      - name: Smoke-test managed install
        if: matrix.managed-install-smoke == 'true'
        run: uv run python scripts/smoke_managed_install.py

  tui:
    name: TUI Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ui-tui/package-lock.json

      - name: Install TUI dependencies
        working-directory: ui-tui
        run: npm ci

      - name: Typecheck TUI
        working-directory: ui-tui
        run: npm run typecheck

      - name: Test TUI
        working-directory: ui-tui
        run: npm test

      - name: Build TUI
        working-directory: ui-tui
        run: npm run build

      - name: Check built TUI syntax
        run: node --check ui-tui/dist/entry.js

      - name: Check packaged TUI asset
        run: node -e "const fs = require('fs'); const built = fs.readFileSync('ui-tui/dist/entry.js'); const packaged = fs.readFileSync('demiurge/ui/tui_dist/entry.js'); if (!built.equals(packaged)) { console.error('packaged TUI asset is out of date'); process.exit(1); }"

  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check whitespace
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD -- ':!demiurge/ui/tui_dist/entry.js'
          else
            empty_tree="$(git hash-object -t tree /dev/null)"
            git diff --check "$empty_tree" HEAD -- ':!demiurge/ui/tui_dist/entry.js'
          fi
