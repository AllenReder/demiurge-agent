name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group dev --python "${{ matrix.python-version }}"

      - name: Compile Python sources
        run: uv run python -m compileall demiurge tests

      - name: Run Python tests
        run: uv run pytest -vv --durations=20 -o faulthandler_timeout=60

      - name: Check CLI help
        run: |
          uv run demiurge --help
          uv run demiurge init --help

      - name: Build package
        run: uv build

      - name: Smoke-test managed install
        if: matrix.python-version == '3.11'
        run: uv run python scripts/smoke_managed_install.py

  tui:
    name: TUI Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20, 24]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: ui-tui/package-lock.json

      - name: Install TUI dependencies
        working-directory: ui-tui
        run: npm ci

      - name: Typecheck TUI
        working-directory: ui-tui
        run: npm run typecheck

      - name: Test TUI
        working-directory: ui-tui
        run: npm test

      - name: Build TUI
        working-directory: ui-tui
        run: npm run build

      - name: Check built TUI syntax
        run: node --check ui-tui/dist/entry.js

      - name: Check packaged TUI asset
        run: node -e "const fs = require('fs'); const built = fs.readFileSync('ui-tui/dist/entry.js'); const packaged = fs.readFileSync('demiurge/ui/tui_dist/entry.js'); if (!built.equals(packaged)) { console.error('packaged TUI asset is out of date'); process.exit(1); }"

  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check whitespace
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD -- ':!demiurge/ui/tui_dist/entry.js'
          else
            empty_tree="$(git hash-object -t tree /dev/null)"
            git diff --check "$empty_tree" HEAD -- ':!demiurge/ui/tui_dist/entry.js'
          fi
