provider: stt_gemini
base_url: https://generativelanguage.googleapis.com/v1beta
model: gemini-2.5-flash
api_key: null
api_key_env: DEMIURGE_GEMINI_API_KEY
fallback_envs:
- GEMINI_API_KEY
- GOOGLE_API_KEY
language: null
include_timestamps: false
include_metadata: true
transcript_label: Voice message transcript
transcription_instruction: Transcribe the attached audio into text. Return only JSON
  with keys text, language, confidence, segments, and warnings; include timestamps
  in segments only when requested or clearly useful.
max_audio_mb: 20
max_audio_seconds: 1800
allowed_mime_types:
- audio/aac
- audio/flac
- audio/m4a
- audio/mp3
- audio/mpeg
- audio/mp4
- audio/ogg
- audio/opus
- audio/wav
- audio/webm
- audio/x-m4a
- audio/x-wav
- video/mp4
- video/webm
