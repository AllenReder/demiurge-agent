provider: stt_dashscope
base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
endpoint: /chat/completions
model: qwen3-asr-flash
api_key: null
api_key_env: DEMIURGE_DASHSCOPE_API_KEY
fallback_envs:
- DASHSCOPE_API_KEY
language: null
enable_itn: true
include_metadata: true
transcript_label: Voice message transcript
transcription_instruction: Transcribe the attached audio into text. Return only the
  transcript.
max_audio_mb: 7
max_audio_seconds: 1800
allowed_mime_types:
- audio/aac
- audio/flac
- audio/m4a
- audio/mp3
- audio/mpeg
- audio/mp4
- audio/ogg
- audio/opus
- audio/wav
- audio/webm
- audio/x-m4a
- audio/x-wav
- video/mp4
- video/webm
