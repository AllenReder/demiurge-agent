provider: stt_deepgram
base_url: https://api.deepgram.com/v1/listen
model: nova-3
api_key: null
api_key_env: DEMIURGE_DEEPGRAM_API_KEY
fallback_envs:
- DEEPGRAM_API_KEY
language: null
detect_language: true
diarization: false
punctuate: true
smart_format: true
include_metadata: true
transcript_label: Voice message transcript
max_audio_mb: 100
max_audio_seconds: 7200
allowed_mime_types:
- audio/aac
- audio/flac
- audio/m4a
- audio/mp3
- audio/mpeg
- audio/mp4
- audio/ogg
- audio/opus
- audio/wav
- audio/webm
- audio/x-m4a
- audio/x-wav
- video/mp4
- video/webm
