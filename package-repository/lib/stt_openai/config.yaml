provider: stt_openai
base_url: https://api.openai.com/v1
endpoint: /audio/transcriptions
model: gpt-4o-mini-transcribe
response_format: verbose_json
api_key: null
api_key_env: DEMIURGE_OPENAI_API_KEY
fallback_envs:
- OPENAI_API_KEY
language: null
context_hint: null
timestamp_granularity: none
include_metadata: true
transcript_label: Voice message transcript
max_audio_mb: 25
max_audio_seconds: 1800
allowed_mime_types:
- audio/aac
- audio/flac
- audio/m4a
- audio/mp3
- audio/mpeg
- audio/mp4
- audio/ogg
- audio/opus
- audio/wav
- audio/webm
- audio/x-m4a
- audio/x-wav
- video/mp4
- video/webm
