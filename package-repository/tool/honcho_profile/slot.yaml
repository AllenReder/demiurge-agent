entrypoint: module:execute
description: Retrieve or update a Honcho peer card. Omit card to read the current card; pass card to replace it.
failure_policy: soft
input_schema:
  type: object
  properties:
    peer:
      type: string
      description: Peer to query. Use user, ai, or an explicit Honcho peer id.
    card:
      type: array
      description: New peer card as a list of fact strings. Omit to read.
      items:
        type: string
  additionalProperties: false
capability: network.fetch
risk: medium
approval_policy: auto
display_policy: summary
model_output_policy: content
capabilities:
  - network.fetch
