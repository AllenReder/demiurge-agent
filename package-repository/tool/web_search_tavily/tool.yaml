input_schema:
  type: object
  properties:
    query:
      type: string
      description: Search query string.
    search_depth:
      type: string
      enum:
      - basic
      - advanced
      description: Optional Tavily search depth.
    topic:
      type: string
      enum:
      - general
      - news
      - finance
      description: Optional Tavily topic.
    time_range:
      type: string
      enum:
      - day
      - week
      - month
      - year
      - d
      - w
      - m
      - y
      description: Optional time range filter.
    start_date:
      type: string
      description: Optional start date for results, using YYYY-MM-DD.
    end_date:
      type: string
      description: Optional end date for results, using YYYY-MM-DD.
    max_results:
      type: integer
      description: Number of results to return.
      minimum: 1
      maximum: 20
      default: 5
    include_answer:
      type: string
      enum:
      - 'false'
      - 'true'
      - basic
      - advanced
      description: Whether Tavily should include a generated answer. Use false, true,
        basic, or advanced.
    include_domains:
      type: array
      items:
        type: string
      description: Optional domains to include.
    exclude_domains:
      type: array
      items:
        type: string
      description: Optional domains to exclude.
    country:
      type: string
      description: Optional country hint for search.
  required:
  - query
  additionalProperties: false
risk: medium
capabilities:
- network.fetch
approval_policy: prompt
description: Search the web using Tavily Search. Returns structured web results and
  optional generated answers.
entrypoint: module:execute
display_policy: summary
capability: network.fetch
model_output_policy: content
