entrypoint: module:execute
description: Ask Honcho a natural-language question and get a synthesized answer from its dialectic reasoning layer.
failure_policy: soft
input_schema:
  type: object
  properties:
    query:
      type: string
      description: A natural-language question for Honcho memory.
    reasoning_level:
      type: string
      enum:
        - minimal
        - low
        - medium
        - high
        - max
      description: Optional reasoning depth override.
    peer:
      type: string
      description: Peer to query. Use user, ai, or an explicit Honcho peer id.
  required:
    - query
  additionalProperties: false
capability: network.fetch
risk: medium
approval_policy: auto
display_policy: summary
model_output_policy: content
capabilities:
  - network.fetch
