schema_version: 2
id: stt_groq
name: Groq STT
summary: Transcribe voice and audio attachments with Groq Whisper-compatible speech-to-text before the model request.
tags:
  - audio
  - stt
  - speech-to-text
  - input
  - provider:groq
options:
  - id: api_key
    type: secret
    prompt: Groq API key
    description: Optional direct Groq API key; leave empty to read DEMIURGE_GROQ_API_KEY.
    required: false
    default: null
  - id: language
    type: string
    prompt: Spoken language
    description: Optional ISO language hint such as en, zh, ja, or fr; leave empty for provider detection.
    required: false
    default: null
  - id: context_hint
    type: string
    prompt: Transcription context hint
    description: Optional vocabulary, names, or style guidance sent to the transcription model.
    required: false
    default: null
  - id: timestamp_granularity
    type: choice
    prompt: Timestamp granularity
    description: Choose whether to request segment or word timestamps when the provider supports them.
    default: none
    choices:
      - value: none
        description: Return transcript text without timestamps.
      - value: segment
        description: Request segment-level timestamps.
      - value: word
        description: Request word-level timestamps.
  - id: include_metadata
    type: bool
    prompt: Include transcript metadata
    description: Add compact provider/source metadata next to the transcript in the user prompt.
    default: true
components:
  - id: stt_common_lib
    kind: lib
    source: stt_common
    target: agent/lib/stt_common
  - id: stt_lib
    kind: lib
    source: stt_groq
    target: agent/lib/stt_groq
    config:
      provider: stt_groq
      base_url: https://api.groq.com/openai/v1
      endpoint: /audio/transcriptions
      model: whisper-large-v3-turbo
      response_format: verbose_json
      api_key: ${options.api_key}
      api_key_env: DEMIURGE_GROQ_API_KEY
      fallback_envs:
        - GROQ_API_KEY
      language: ${options.language}
      context_hint: ${options.context_hint}
      timestamp_granularity: ${options.timestamp_granularity}
      include_metadata: ${options.include_metadata}
      transcript_label: Voice message transcript
      max_audio_mb: 25
      max_audio_seconds: 1800
      allowed_mime_types:
        - audio/aac
        - audio/flac
        - audio/m4a
        - audio/mp3
        - audio/mpeg
        - audio/mp4
        - audio/ogg
        - audio/opus
        - audio/wav
        - audio/webm
        - audio/x-m4a
        - audio/x-wav
        - video/mp4
        - video/webm
  - id: stt_input
    kind: input
    source: stt_groq
    target: agent/input/speech_to_text
    pipeline:
      group: serial
      before: base_input
  - id: stt_skill
    kind: skill
    source: stt_transcription
    target: agent/skills/stt_transcription
