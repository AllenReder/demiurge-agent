schema_version: 1
id: stt_dashscope
name: DashScope STT
summary: Transcribe voice and audio attachments with Alibaba Cloud Model Studio before
  the model request.
tags:
- audio
- stt
- speech-to-text
- input
- provider:dashscope
- provider:aliyun
options:
- id: api_key
  type: secret
  prompt: DashScope API key
  description: Optional direct DashScope API key; leave empty to read DEMIURGE_DASHSCOPE_API_KEY.
  required: false
  default: null
- id: language
  type: string
  prompt: Spoken language
  description: Optional language hint such as Chinese, English, Japanese, or Korean.
  required: false
  default: null
- id: include_metadata
  type: bool
  prompt: Include transcript metadata
  description: Add compact provider/source metadata next to the transcript in the
    user prompt.
  default: true
- id: enable_itn
  type: bool
  prompt: Enable inverse text normalization
  description: Ask DashScope to normalize recognized numbers, dates, and similar spoken
    text.
  default: true
capabilities:
- network.fetch
components:
- id: stt_input
  kind: input
  source: stt_dashscope
  target: agent/input/speech_to_text
  pipeline:
    group: serial
    append: true
- id: stt_common_lib
  kind: lib
  source: stt_common
  target: agent/lib/stt_common
- id: stt_lib
  kind: lib
  source: stt_dashscope
  target: agent/lib/stt_dashscope
  config:
    api_key: ${options.api_key}
    language: ${options.language}
    enable_itn: ${options.enable_itn}
    include_metadata: ${options.include_metadata}
