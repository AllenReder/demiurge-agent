schema_version: 2
id: stt_dashscope
name: DashScope STT
summary: Transcribe voice and audio attachments with Alibaba Cloud Model Studio before the model request.
tags:
  - audio
  - stt
  - speech-to-text
  - input
  - provider:dashscope
  - provider:aliyun
options:
  - id: api_key
    type: secret
    prompt: DashScope API key
    description: Optional direct DashScope API key; leave empty to read DEMIURGE_DASHSCOPE_API_KEY.
    required: false
    default: null
  - id: language
    type: string
    prompt: Spoken language
    description: Optional language hint such as Chinese, English, Japanese, or Korean.
    required: false
    default: null
  - id: include_metadata
    type: bool
    prompt: Include transcript metadata
    description: Add compact provider/source metadata next to the transcript in the user prompt.
    default: true
  - id: enable_itn
    type: bool
    prompt: Enable inverse text normalization
    description: Ask DashScope to normalize recognized numbers, dates, and similar spoken text.
    default: true
components:
  - id: stt_common_lib
    kind: lib
    source: stt_common
    target: agent/lib/stt_common
  - id: stt_lib
    kind: lib
    source: stt_dashscope
    target: agent/lib/stt_dashscope
    config:
      provider: stt_dashscope
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      endpoint: /chat/completions
      model: qwen3-asr-flash
      api_key: ${options.api_key}
      api_key_env: DEMIURGE_DASHSCOPE_API_KEY
      fallback_envs:
        - DASHSCOPE_API_KEY
      language: ${options.language}
      enable_itn: ${options.enable_itn}
      include_metadata: ${options.include_metadata}
      transcript_label: Voice message transcript
      transcription_instruction: Transcribe the attached audio into text. Return only the transcript.
      max_audio_mb: 7
      max_audio_seconds: 1800
      allowed_mime_types:
        - audio/aac
        - audio/flac
        - audio/m4a
        - audio/mp3
        - audio/mpeg
        - audio/mp4
        - audio/ogg
        - audio/opus
        - audio/wav
        - audio/webm
        - audio/x-m4a
        - audio/x-wav
        - video/mp4
        - video/webm
  - id: stt_input
    kind: input
    source: stt_dashscope
    target: agent/input/speech_to_text
    pipeline:
      group: serial
      before: base_input
  - id: stt_skill
    kind: skill
    source: stt_transcription
    target: agent/skills/stt_transcription
