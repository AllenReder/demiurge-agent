schema_version: 1
id: stt_assemblyai
name: AssemblyAI STT
summary: Transcribe voice and audio attachments with AssemblyAI before the model request.
tags:
- audio
- stt
- speech-to-text
- input
- provider:assemblyai
options:
- id: api_key
  type: secret
  prompt: AssemblyAI API key
  description: Optional direct AssemblyAI API key; leave empty to read DEMIURGE_ASSEMBLYAI_API_KEY.
  required: false
  default: null
- id: language
  type: string
  prompt: Spoken language
  description: Optional language code such as en, zh, ja, or fr; leave empty for language
    detection when enabled.
  required: false
  default: null
- id: detect_language
  type: bool
  prompt: Detect language
  description: Ask AssemblyAI to detect the spoken language when no language hint
    is supplied.
  default: true
- id: speaker_labels
  type: bool
  prompt: Speaker labels
  description: Request speaker labels and utterance metadata when supported.
  default: false
- id: include_metadata
  type: bool
  prompt: Include transcript metadata
  description: Add compact provider/source metadata next to the transcript in the
    user prompt.
  default: true
capabilities:
- network.fetch
components:
- id: stt_input
  kind: input
  source: stt_assemblyai
  target: agent/input/speech_to_text
  pipeline:
    group: serial
    append: true
- id: stt_common_lib
  kind: lib
  source: stt_common
  target: agent/lib/stt_common
- id: stt_lib
  kind: lib
  source: stt_assemblyai
  target: agent/lib/stt_assemblyai
  config:
    api_key: ${options.api_key}
    language: ${options.language}
    detect_language: ${options.detect_language}
    speaker_labels: ${options.speaker_labels}
    include_metadata: ${options.include_metadata}
