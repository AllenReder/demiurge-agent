schema_version: 2
id: stt_deepgram
name: Deepgram STT
summary: Transcribe voice and audio attachments with Deepgram before the model request.
tags:
  - audio
  - stt
  - speech-to-text
  - input
  - provider:deepgram
options:
  - id: api_key
    type: secret
    prompt: Deepgram API key
    description: Optional direct Deepgram API key; leave empty to read DEMIURGE_DEEPGRAM_API_KEY.
    required: false
    default: null
  - id: language
    type: string
    prompt: Spoken language
    description: Optional BCP-47 language hint such as en, zh, ja, or fr; leave empty for provider detection when enabled.
    required: false
    default: null
  - id: detect_language
    type: bool
    prompt: Detect language
    description: Ask Deepgram to detect the spoken language when no language hint is supplied.
    default: true
  - id: diarization
    type: bool
    prompt: Speaker diarization
    description: Request speaker diarization metadata when supported by the selected Deepgram model.
    default: false
  - id: include_metadata
    type: bool
    prompt: Include transcript metadata
    description: Add compact provider/source metadata next to the transcript in the user prompt.
    default: true
components:
  - id: stt_common_lib
    kind: lib
    source: stt_common
    target: agent/lib/stt_common
  - id: stt_lib
    kind: lib
    source: stt_deepgram
    target: agent/lib/stt_deepgram
    config:
      provider: stt_deepgram
      base_url: https://api.deepgram.com/v1/listen
      model: nova-3
      api_key: ${options.api_key}
      api_key_env: DEMIURGE_DEEPGRAM_API_KEY
      fallback_envs:
        - DEEPGRAM_API_KEY
      language: ${options.language}
      detect_language: ${options.detect_language}
      diarization: ${options.diarization}
      punctuate: true
      smart_format: true
      include_metadata: ${options.include_metadata}
      transcript_label: Voice message transcript
      max_audio_mb: 100
      max_audio_seconds: 7200
      allowed_mime_types:
        - audio/aac
        - audio/flac
        - audio/m4a
        - audio/mp3
        - audio/mpeg
        - audio/mp4
        - audio/ogg
        - audio/opus
        - audio/wav
        - audio/webm
        - audio/x-m4a
        - audio/x-wav
        - video/mp4
        - video/webm
  - id: stt_input
    kind: input
    source: stt_deepgram
    target: agent/input/speech_to_text
    pipeline:
      group: serial
      before: base_input
