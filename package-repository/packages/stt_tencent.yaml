schema_version: 2
id: stt_tencent
name: Tencent Cloud STT
summary: Transcribe voice and audio attachments with Tencent Cloud ASR before the model request.
tags:
  - audio
  - stt
  - speech-to-text
  - input
  - provider:tencent
options:
  - id: secret_id
    type: secret
    prompt: Tencent Cloud SecretId
    description: Optional Tencent Cloud SecretId; leave empty to read DEMIURGE_TENCENT_SECRET_ID.
    required: false
    default: null
  - id: secret_key
    type: secret
    prompt: Tencent Cloud SecretKey
    description: Optional Tencent Cloud SecretKey; leave empty to read DEMIURGE_TENCENT_SECRET_KEY.
    required: false
    default: null
  - id: region
    type: string
    prompt: Tencent Cloud region
    description: Tencent Cloud API region such as ap-shanghai.
    required: false
    default: ap-shanghai
  - id: engine_model_type
    type: string
    prompt: ASR engine model type
    description: Tencent ASR engine model type, for example 16k_zh or 16k_en.
    required: false
    default: 16k_zh
  - id: include_metadata
    type: bool
    prompt: Include transcript metadata
    description: Add compact provider/source metadata next to the transcript in the user prompt.
    default: true
components:
  - id: stt_common_lib
    kind: lib
    source: stt_common
    target: agent/lib/stt_common
  - id: stt_lib
    kind: lib
    source: stt_tencent
    target: agent/lib/stt_tencent
    config:
      provider: stt_tencent
      host: asr.tencentcloudapi.com
      action: SentenceRecognition
      version: "2019-06-14"
      region: ${options.region}
      model: ${options.engine_model_type}
      engine_model_type: ${options.engine_model_type}
      secret_id: ${options.secret_id}
      secret_id_env: DEMIURGE_TENCENT_SECRET_ID
      secret_key: ${options.secret_key}
      secret_key_env: DEMIURGE_TENCENT_SECRET_KEY
      project_id: 0
      sub_service_type: 2
      word_info: 0
      convert_num_mode: 1
      include_metadata: ${options.include_metadata}
      transcript_label: Voice message transcript
      max_audio_mb: 3
      max_audio_seconds: 60
      allowed_mime_types:
        - audio/amr
        - audio/m4a
        - audio/mp3
        - audio/mpeg
        - audio/pcm
        - audio/wav
        - audio/x-wav
  - id: stt_input
    kind: input
    source: stt_tencent
    target: agent/input/speech_to_text
    pipeline:
      group: serial
      before: base_input
  - id: stt_skill
    kind: skill
    source: stt_transcription
    target: agent/skills/stt_transcription
