schema_version: 3
id: stt_gemini
name: Gemini STT
summary: Transcribe voice and audio attachments with Gemini multimodal input before
  the model request.
tags:
- audio
- stt
- speech-to-text
- input
- provider:gemini
options:
- id: api_key
  type: secret
  prompt: Gemini API key
  description: Optional direct Gemini API key; leave empty to read DEMIURGE_GEMINI_API_KEY.
  required: false
  default: null
- id: language
  type: string
  prompt: Spoken language
  description: Optional language hint such as English, Mandarin, Japanese, or French.
  required: false
  default: null
- id: include_timestamps
  type: bool
  prompt: Include timestamps
  description: Ask Gemini to include timestamp metadata in the normalized JSON transcript
    when useful.
  default: false
- id: include_metadata
  type: bool
  prompt: Include transcript metadata
  description: Add compact provider/source metadata next to the transcript in the
    user prompt.
  default: true
config_defaults: {}
capabilities:
- network.fetch
slots:
- id: stt_input
  source: stt_gemini
  target: agent/input/speech_to_text
  pipeline:
    group: serial
    before: base_input
  phase: input
  metadata:
    entrypoint: module:process
    history_policy: persist
    failure_policy: soft
    description: Transcribe voice/audio attachments with Gemini STT and add the transcript
      to the user prompt.
    capabilities:
    - network.fetch
files:
- id: stt_common_lib
  kind: lib
  source: stt_common
  target: agent/lib/stt_common
- id: stt_lib
  kind: lib
  source: stt_gemini
  target: agent/lib/stt_gemini
  config:
    provider: stt_gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    model: gemini-2.5-flash
    api_key: ${options.api_key}
    api_key_env: DEMIURGE_GEMINI_API_KEY
    fallback_envs:
    - GEMINI_API_KEY
    - GOOGLE_API_KEY
    language: ${options.language}
    include_timestamps: ${options.include_timestamps}
    include_metadata: ${options.include_metadata}
    transcript_label: Voice message transcript
    transcription_instruction: Transcribe the attached audio into text. Return only
      JSON with keys text, language, confidence, segments, and warnings; include timestamps
      in segments only when requested or clearly useful.
    max_audio_mb: 20
    max_audio_seconds: 1800
    allowed_mime_types:
    - audio/aac
    - audio/flac
    - audio/m4a
    - audio/mp3
    - audio/mpeg
    - audio/mp4
    - audio/ogg
    - audio/opus
    - audio/wav
    - audio/webm
    - audio/x-m4a
    - audio/x-wav
    - video/mp4
    - video/webm
