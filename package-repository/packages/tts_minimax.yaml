schema_version: 3
id: tts_minimax
name: MiniMax TTS
summary: Generate speech audio with MiniMax, either directly or through a summarizer
  core.
tags:
- audio
- tts
- provider:minimax
options:
- id: mode
  type: choice
  prompt: TTS mode
  description: Choose whether the output module speaks the final text directly or
    first runs a summarizer core.
  default: direct
  choices:
  - value: direct
    description: Generate speech from the assistant reply as-is.
  - value: summary
    description: Summarize the assistant reply before generating speech.
- id: enable_tool
  type: bool
  prompt: Add agent TTS tool
  description: Also install an authored tool so the agent can generate speech on demand.
  default: false
- id: api_key
  type: secret
  prompt: MiniMax API key
  description: Optional direct MiniMax API key; leave empty to read DEMIURGE_MINIMAX_API_KEY.
  required: false
  default: null
config_defaults: {}
capabilities:
- agents.run:tts_summarizer
- network.fetch
slots:
- id: tts_output
  source: tts_minimax
  target: agent/output/tts_minimax
  pipeline:
    group: parallel
  config:
    summarizer_core: null
    summary: MiniMax TTS audio
    max_text_length: 10000
    strip_markdown: true
  config_when:
  - when:
      mode: summary
    config:
      summarizer_core: tts_summarizer
      summary: MiniMax summarized TTS audio
  phase: output
  metadata:
    entrypoint: module:process
    failure_policy: soft
    description: Generate and deliver a MiniMax TTS audio artifact from assistant
      output.
    capabilities:
    - agents.run:tts_summarizer
tools:
- id: tts_tool
  source: text_to_speech_minimax
  target: agent/tools/text_to_speech
  config:
    filename_template: '{turn_id}-tool.{format}'
  when:
    enable_tool: true
  metadata:
    entrypoint: module:execute
    input_schema:
      type: object
      properties:
        text:
          type: string
          description: Text to synthesize and send as speech audio.
      required:
      - text
      additionalProperties: false
    model_output_policy: content
    approval_policy: prompt
    display_policy: summary
    risk: medium
    description: Generate and send a speech audio message from text using the configured
      MiniMax TTS provider.
    capabilities:
    - network.fetch
    capability: network.fetch
files:
- id: tts_lib
  kind: lib
  source: tts_minimax
  target: agent/lib/tts_minimax
  config:
    provider: tts_minimax
    base_url: https://api.minimaxi.com/v1/t2a_v2
    model: speech-2.8-hd
    voice_setting:
      voice_id: male-qn-qingse
    audio_setting: {}
    output_dir: .demiurge-tts
    media_type: audio/mpeg
    api_key: ${options.api_key}
    api_key_env: DEMIURGE_MINIMAX_API_KEY
    group_id: null
    group_id_env: DEMIURGE_MINIMAX_GROUP_ID
- id: tts_summarizer
  kind: core
  source: tts_summarizer
  target_core_id: tts_summarizer
  when:
    mode: summary
- id: tts_voice_skill
  kind: skill
  source: tts_voice
  target: agent/skills/tts_voice
  when:
    enable_tool: true
