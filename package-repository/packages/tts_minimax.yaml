schema_version: 1
id: tts_minimax
name: MiniMax TTS
summary: Generate speech audio with MiniMax, either directly or through a summarizer
  core.
tags:
- audio
- tts
- provider:minimax
options:
- id: mode
  type: choice
  prompt: TTS mode
  description: Choose whether the output module speaks the final text directly or
    first runs a summarizer core.
  default: direct
  choices:
  - value: direct
    description: Generate speech from the assistant reply as-is.
  - value: summary
    description: Summarize the assistant reply before generating speech.
- id: enable_tool
  type: bool
  prompt: Add agent TTS tool
  description: Also install an authored tool so the agent can generate speech on demand.
  default: false
- id: api_key
  type: secret
  prompt: MiniMax API key
  description: Optional direct MiniMax API key; leave empty to read DEMIURGE_MINIMAX_API_KEY.
  required: false
  default: null
capabilities:
- agents.run:tts_summarizer
- network.fetch
components:
- id: tts_output
  kind: output
  source: tts_minimax
  target: agent/output/tts_minimax
  pipeline:
    group: parallel
    append: true
  config_when:
  - when:
      mode: summary
    config:
      summarizer_core: tts_summarizer
      summary: MiniMax summarized TTS audio
- id: tts_tool
  kind: tool
  source: text_to_speech_minimax
  target: agent/tools/text_to_speech
  when:
    enable_tool: true
- id: tts_lib
  kind: lib
  source: tts_minimax
  target: agent/lib/tts_minimax
  config:
    api_key: ${options.api_key}
- id: tts_summarizer
  kind: core
  source: tts_summarizer
  target_core_id: tts_summarizer
  when:
    mode: summary
- id: tts_voice_skill
  kind: skill
  source: tts_voice
  target: agent/skills/tts_voice
  when:
    enable_tool: true
