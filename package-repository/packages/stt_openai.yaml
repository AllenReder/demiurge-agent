schema_version: 1
id: stt_openai
name: OpenAI STT
summary: Transcribe voice and audio attachments with OpenAI speech-to-text before
  the model request.
tags:
- audio
- stt
- speech-to-text
- input
- provider:openai
options:
- id: api_key
  type: secret
  prompt: OpenAI API key
  description: Optional direct OpenAI API key; leave empty to read DEMIURGE_OPENAI_API_KEY.
  required: false
  default: null
- id: language
  type: string
  prompt: Spoken language
  description: Optional ISO language hint such as en, zh, ja, or fr; leave empty for
    provider detection.
  required: false
  default: null
- id: context_hint
  type: string
  prompt: Transcription context hint
  description: Optional vocabulary, names, or style guidance sent to the transcription
    model.
  required: false
  default: null
- id: timestamp_granularity
  type: choice
  prompt: Timestamp granularity
  description: Choose whether to request segment or word timestamps when the provider
    supports them.
  default: none
  choices:
  - value: none
    description: Return transcript text without timestamps.
  - value: segment
    description: Request segment-level timestamps.
  - value: word
    description: Request word-level timestamps.
- id: include_metadata
  type: bool
  prompt: Include transcript metadata
  description: Add compact provider/source metadata next to the transcript in the
    user prompt.
  default: true
capabilities:
- network.fetch
components:
- id: stt_input
  kind: input
  source: stt_openai
  target: agent/input/speech_to_text
  pipeline:
    group: serial
    append: true
- id: stt_common_lib
  kind: lib
  source: stt_common
  target: agent/lib/stt_common
- id: stt_lib
  kind: lib
  source: stt_openai
  target: agent/lib/stt_openai
  config:
    api_key: ${options.api_key}
    language: ${options.language}
    context_hint: ${options.context_hint}
    timestamp_granularity: ${options.timestamp_granularity}
    include_metadata: ${options.include_metadata}
