schema_version: 3
id: web_search_brave
name: Brave Web Search
summary: Search the web with Brave Search through a package-owned web_search tool.
tags:
- web
- search
- provider:brave
options:
- id: api_key
  type: secret
  prompt: Brave Search API key
  description: Optional direct Brave Search API key; leave empty to read DEMIURGE_BRAVE_SEARCH_API_KEY.
  required: false
  default: null
config_defaults: {}
capabilities:
- network.fetch
tools:
- id: web_search_tool
  source: web_search_brave
  target: agent/tools/web_search
  metadata:
    entrypoint: module:execute
    input_schema:
      type: object
      properties:
        query:
          type: string
          description: Search query string. Backend-supported operators such as site:,
            filetype:, -term, and quoted phrases may work.
        count:
          type: integer
          description: Number of results to return.
          minimum: 1
          maximum: 20
          default: 5
        country:
          type: string
          description: Optional 2-letter country code for regional results, such as
            US or DE.
        search_lang:
          type: string
          description: Optional Brave search language code, such as en, en-gb, zh-hans,
            or zh-hant.
        ui_lang:
          type: string
          description: Optional UI locale, such as en-US or de-DE.
        safesearch:
          type: string
          enum:
          - 'off'
          - moderate
          - strict
          description: Optional safe search level.
        freshness:
          type: string
          enum:
          - pd
          - pw
          - pm
          - py
          description: Optional time filter, using Brave values pd, pw, pm, or py.
        date_after:
          type: string
          description: Optional YYYY-MM-DD start date. Must be paired with date_before.
        date_before:
          type: string
          description: Optional YYYY-MM-DD end date. Must be paired with date_after.
      required:
      - query
      additionalProperties: false
    model_output_policy: content
    approval_policy: prompt
    display_policy: summary
    risk: medium
    description: Search the web using Brave Search. Returns structured web results
      with titles, URLs, and snippets.
    capabilities:
    - network.fetch
    capability: network.fetch
files:
- id: web_search_lib
  kind: lib
  source: web_search_brave
  target: agent/lib/web_search_brave
  config:
    provider: web_search_brave
    base_url: https://api.search.brave.com/res/v1/web/search
    timeout_seconds: 30
    default_count: 5
    api_key: ${options.api_key}
    api_key_env: DEMIURGE_BRAVE_SEARCH_API_KEY
    fallback_envs:
    - BRAVE_SEARCH_API_KEY
    - BRAVE_API_KEY
