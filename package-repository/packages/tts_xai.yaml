schema_version: 2
id: tts_xai
name: xAI TTS
summary: Generate speech audio with xAI speech synthesis, either directly or through a summarizer core.
tags:
  - audio
  - tts
  - provider:xai
options:
  - id: mode
    type: choice
    prompt: TTS mode
    description: Choose whether the output module speaks the final text directly or first runs a summarizer core.
    default: direct
    choices:
      - value: direct
        description: Generate speech from the assistant reply as-is.
      - value: summary
        description: Summarize the assistant reply before generating speech.
  - id: enable_tool
    type: bool
    prompt: Add agent TTS tool
    description: Also install an authored TTS tool so the agent can generate speech on demand.
    default: false
  - id: api_key
    type: secret
    prompt: xAI API key
    description: Optional direct xAI API key; leave empty to read DEMIURGE_XAI_API_KEY.
    required: false
    default: null
components:
  - id: tts_lib
    kind: lib
    source: tts_xai
    target: agent/lib/tts_xai
    config:
      provider: tts_xai
      base_url: https://api.x.ai/v1
      endpoint: /tts
      voice_id: eve
      language: en
      output_format:
        codec: mp3
      output_dir: .demiurge-tts
      filename_template: "{turn_id}-xai.{format}"
      media_type: audio/mpeg
      api_key: ${options.api_key}
      api_key_env: DEMIURGE_XAI_API_KEY
      fallback_envs:
        - XAI_API_KEY
  - id: tts_output
    kind: output
    source: tts_xai
    target: agent/output/tts_xai
    when:
      mode: direct
    pipeline:
      group: parallel
    config:
      summarizer_core: null
      summary: xAI TTS audio
      max_text_length: 10000
      strip_markdown: true
  - id: tts_output_summary
    kind: output
    source: tts_xai_summary
    target: agent/output/tts_xai
    when:
      mode: summary
    pipeline:
      group: parallel
    config:
      summarizer_core: tts_summarizer
      summary: xAI summarized TTS audio
      max_text_length: 10000
      strip_markdown: true
  - id: tts_summarizer
    kind: core
    source: tts_summarizer
    target_core_id: tts_summarizer
    when:
      mode: summary
  - id: tts_tool
    kind: tool
    source: text_to_speech_xai
    target: agent/tools/text_to_speech
    when:
      enable_tool: true
    config:
      filename_template: "{turn_id}-xai-tool.{format}"
  - id: tts_voice_skill
    kind: skill
    source: tts_voice_xai
    target: agent/skills/tts_voice_xai
    when:
      enable_tool: true
