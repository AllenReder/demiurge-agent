schema_version: 1
id: tts_openai
name: OpenAI TTS
summary: Generate speech audio with OpenAI-compatible speech synthesis, either directly
  or through a summarizer core.
tags:
- audio
- tts
- provider:openai
options:
- id: mode
  type: choice
  prompt: TTS mode
  description: Choose whether the output module speaks the final text directly or
    first runs a summarizer core.
  default: direct
  choices:
  - value: direct
    description: Generate speech from the assistant reply as-is.
  - value: summary
    description: Summarize the assistant reply before generating speech.
- id: enable_tool
  type: bool
  prompt: Add agent TTS tool
  description: Also install an authored TTS tool so the agent can generate speech
    on demand.
  default: false
- id: api_key
  type: secret
  prompt: OpenAI API key
  description: Optional direct OpenAI API key; leave empty to read DEMIURGE_OPENAI_API_KEY.
  required: false
  default: null
capabilities:
- network.fetch
- agents.run:tts_summarizer
components:
- id: tts_output
  kind: output
  source: tts_openai
  target: agent/output/tts_openai
  pipeline:
    group: parallel
    append: true
  when:
    mode: direct
- id: tts_output_summary
  kind: output
  source: tts_openai_summary
  target: agent/output/tts_openai
  pipeline:
    group: parallel
    append: true
  when:
    mode: summary
- id: tts_tool
  kind: tool
  source: text_to_speech_openai
  target: agent/tools/text_to_speech
  when:
    enable_tool: true
- id: tts_lib
  kind: lib
  source: tts_openai
  target: agent/lib/tts_openai
  config:
    api_key: ${options.api_key}
- id: tts_summarizer
  kind: core
  source: tts_summarizer
  target_core_id: tts_summarizer
  when:
    mode: summary
- id: tts_voice_skill
  kind: skill
  source: tts_voice_openai
  target: agent/skills/tts_voice_openai
  when:
    enable_tool: true
