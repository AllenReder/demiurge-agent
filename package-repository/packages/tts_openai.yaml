schema_version: 3
id: tts_openai
name: OpenAI TTS
summary: Generate speech audio with OpenAI-compatible speech synthesis, either directly
  or through a summarizer core.
tags:
- audio
- tts
- provider:openai
options:
- id: mode
  type: choice
  prompt: TTS mode
  description: Choose whether the output module speaks the final text directly or
    first runs a summarizer core.
  default: direct
  choices:
  - value: direct
    description: Generate speech from the assistant reply as-is.
  - value: summary
    description: Summarize the assistant reply before generating speech.
- id: enable_tool
  type: bool
  prompt: Add agent TTS tool
  description: Also install an authored TTS tool so the agent can generate speech
    on demand.
  default: false
- id: api_key
  type: secret
  prompt: OpenAI API key
  description: Optional direct OpenAI API key; leave empty to read DEMIURGE_OPENAI_API_KEY.
  required: false
  default: null
config_defaults: {}
capabilities:
- network.fetch
- agents.run:tts_summarizer
slots:
- id: tts_output
  source: tts_openai
  target: agent/output/tts_openai
  pipeline:
    group: parallel
  config:
    summarizer_core: null
    summary: OpenAI TTS audio
    max_text_length: 10000
    strip_markdown: true
  when:
    mode: direct
  phase: output
  metadata:
    entrypoint: module:process
    failure_policy: soft
    description: Generate and deliver speech audio from assistant output using the
      configured TTS provider.
    capabilities:
    - network.fetch
- id: tts_output_summary
  source: tts_openai_summary
  target: agent/output/tts_openai
  pipeline:
    group: parallel
  config:
    summarizer_core: tts_summarizer
    summary: OpenAI summarized TTS audio
    max_text_length: 10000
    strip_markdown: true
  when:
    mode: summary
  phase: output
  metadata:
    entrypoint: module:process
    failure_policy: soft
    description: Summarize assistant output, then generate and deliver speech audio
      using OpenAI TTS.
    capabilities:
    - agents.run:tts_summarizer
    - network.fetch
tools:
- id: tts_tool
  source: text_to_speech_openai
  target: agent/tools/text_to_speech
  config:
    filename_template: '{turn_id}-openai-tool.{format}'
  when:
    enable_tool: true
  metadata:
    entrypoint: module:execute
    input_schema:
      type: object
      properties:
        text:
          type: string
          description: Text to synthesize and send as speech audio.
      required:
      - text
      additionalProperties: false
    model_output_policy: content
    approval_policy: prompt
    display_policy: summary
    risk: medium
    description: Generate and send a speech audio message from text using OpenAI TTS.
    capabilities:
    - network.fetch
    capability: network.fetch
files:
- id: tts_lib
  kind: lib
  source: tts_openai
  target: agent/lib/tts_openai
  config:
    provider: tts_openai
    base_url: https://api.openai.com/v1
    endpoint: /audio/speech
    model: gpt-4o-mini-tts
    voice: alloy
    response_format: mp3
    output_dir: .demiurge-tts
    filename_template: '{turn_id}-openai.{format}'
    media_type: audio/mpeg
    api_key: ${options.api_key}
    api_key_env: DEMIURGE_OPENAI_API_KEY
    fallback_envs:
    - OPENAI_API_KEY
- id: tts_summarizer
  kind: core
  source: tts_summarizer
  target_core_id: tts_summarizer
  when:
    mode: summary
- id: tts_voice_skill
  kind: skill
  source: tts_voice_openai
  target: agent/skills/tts_voice_openai
  when:
    enable_tool: true
