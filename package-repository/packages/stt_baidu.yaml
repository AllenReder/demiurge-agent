schema_version: 3
id: stt_baidu
name: Baidu STT
summary: Transcribe voice and audio attachments with Baidu Cloud Speech Recognition
  before the model request.
tags:
- audio
- stt
- speech-to-text
- input
- provider:baidu
options:
- id: api_key
  type: secret
  prompt: Baidu API key
  description: Optional Baidu API key used with secret_key to request an access token;
    leave empty to read DEMIURGE_BAIDU_API_KEY.
  required: false
  default: null
- id: secret_key
  type: secret
  prompt: Baidu secret key
  description: Optional Baidu secret key used with api_key; leave empty to read DEMIURGE_BAIDU_SECRET_KEY.
  required: false
  default: null
- id: access_token
  type: secret
  prompt: Baidu access token
  description: Optional pre-issued Baidu access token; leave empty to read DEMIURGE_BAIDU_ACCESS_TOKEN
    or request one from api_key and secret_key.
  required: false
  default: null
- id: language
  type: string
  prompt: Spoken language
  description: Optional language label for transcript metadata; Baidu dev_pid controls
    the recognition model.
  required: false
  default: null
- id: dev_pid
  type: string
  prompt: Baidu dev_pid
  description: Baidu speech recognition model id; defaults to 1537.
  required: false
  default: '1537'
- id: include_metadata
  type: bool
  prompt: Include transcript metadata
  description: Add compact provider/source metadata next to the transcript in the
    user prompt.
  default: true
config_defaults: {}
capabilities:
- network.fetch
slots:
- id: stt_input
  source: stt_baidu
  target: agent/input/speech_to_text
  pipeline:
    group: serial
    before: base_input
  phase: input
  metadata:
    entrypoint: module:process
    history_policy: persist
    failure_policy: soft
    description: Transcribe voice/audio attachments with Baidu STT and add the transcript
      to the user prompt.
    capabilities:
    - network.fetch
files:
- id: stt_common_lib
  kind: lib
  source: stt_common
  target: agent/lib/stt_common
- id: stt_lib
  kind: lib
  source: stt_baidu
  target: agent/lib/stt_baidu
  config:
    provider: stt_baidu
    base_url: https://vop.baidu.com/server_api
    token_url: https://aip.baidubce.com/oauth/2.0/token
    model: Baidu short speech recognition
    api_key: ${options.api_key}
    api_key_env: DEMIURGE_BAIDU_API_KEY
    fallback_envs:
    - BAIDU_API_KEY
    secret_key: ${options.secret_key}
    secret_key_env: DEMIURGE_BAIDU_SECRET_KEY
    access_token: ${options.access_token}
    access_token_env: DEMIURGE_BAIDU_ACCESS_TOKEN
    language: ${options.language}
    dev_pid: ${options.dev_pid}
    sample_rate: 16000
    channel: 1
    cuid: demiurge
    include_metadata: ${options.include_metadata}
    transcript_label: Voice message transcript
    max_audio_mb: 5
    max_audio_seconds: 60
    allowed_mime_types:
    - audio/amr
    - audio/flac
    - audio/m4a
    - audio/mp3
    - audio/mpeg
    - audio/pcm
    - audio/wav
    - audio/x-wav
