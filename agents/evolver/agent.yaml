schema_version: 1
agent:
  id: evolver
  summary: "Host-managed evolver core for editing isolated agents-tree worktrees."
runtime:
  surface_root: agent
  max_model_steps: 90
  workspace: null
model:
  provider: auto
  model_name: null
  model_options: {}
ui:
  tool_display: null
channels: {}
slots:
  soul: agent/SOUL.md
  input: agent/input
  output: agent/output
  tools: agent/tools
  skills: agent/skills
  schedules: agent/schedules
  mcp: agent/mcp
tools:
  toolsets:
    - coding
  metadata:
    clarify:
      enabled: false
    session_search:
      enabled: false
    skill_manage:
      enabled: false
    todo:
      enabled: false
    web_extract:
      enabled: false
approval:
  default: null
  tools: {}
  capabilities: {}
  risks: {}
capabilities:
  defaults:
    fs.read: {}
    fs.write: {}
    terminal.exec: {}
    task.control: {}
dependencies:
  mode: host_shared
  allow_additional_dependencies: false
